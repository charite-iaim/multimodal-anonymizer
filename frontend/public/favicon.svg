       cy="-10"
       r="6"
       fill="#ffffff"
       stroke="#1e293b"
       stroke-width="0.5"
       id="circle20" />
    <g
       transform="translate(-7,-10)"
       stroke="#dc2626"
       stroke-width="1.3"
       fill="none"
       stroke-linecap="round"
       id="g20">
      <path
         d="M 0,-3.5 C 1.9329966,-3.5 3.5,-1.9329966 3.5,0 3.5262391,1.8735983 1.8124799,2.9618496 0.03506311,2.9649369 -1.6129147,2.9368976 -2.9432145,1.5747265 -2.8422672,0.03506311 -2.7419025,-1.1014048 -1.4088728,-1.9825999 -0.2394588,-1.7043956 0.37484651,-1.5894786 1.5896209,-0.67358553 0.8,0.31556802"
         id="path20"
         sodipodi:nodetypes="cccccc" />
    </g>
    <!-- Right eye: big, dilated, looking up-and-away -->
    <circle
       cx="8"
       cy="-10"
       r="6.5"
       fill="#ffffff"
       stroke="#1e293b"
       stroke-width="0.5"
       id="circle21" />
    <circle
