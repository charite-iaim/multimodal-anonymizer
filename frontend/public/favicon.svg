    <g
       id="g27">
      <path
         d="m 4,24 c 4,2.666667 6.561403,5.087719 9.22807,9.087719 1.333333,2.666667 0.413029,4.310783 -1.578947,4.140351 C 9.0908193,37.009184 7.6140351,35.087719 6,32 4.6666667,29.333333 4,26.666667 4,24 Z"
         fill="#f87171"
         id="path26"
         sodipodi:nodetypes="ccscc" />
