  <!-- ===== DEER HEAD — CRAZY EDITION ===== -->
  <g
     transform="translate(100.25,106.25)"
     id="g31">
    <!-- Left antler — wilder, asymmetric -->
    <g
       stroke="#1e293b"
       stroke-width="4.5"
       stroke-linecap="round"
       stroke-linejoin="round"
       fill="none"
       id="g10">
      <!-- Left main beam — curvy/wonky -->
      <path
         d="m -10,-22 q -8,-18 -4,-36 4,-10 -2,-20"
         id="path1" />
      <!-- Left tine (swoops outward) -->
      <path
         d="M -15.557093,-40 C -24.890427,-42.666667 -30,-41.333333 -34,-36"
         id="path2"
         sodipodi:nodetypes="cc" />
      <!-- Left upper tine (wild angle) -->
      <path
         d="m -14,-58 q -18,-2 -24,6"
         id="path3" />
      <!-- Left crown — goes crooked -->
      <path
         d="m -16,-78 q -10,-10 -6,-18"
         id="path4" />
      <path
         d="M -16,-78 Q -6,-90 -4,-96"
         id="path5" />
      <!-- Right main beam — different curve for asymmetry -->
      <path
         d="m 10,-22 q 10,-16 12,-34 2,-10 -4,-20"
         id="path6" />
      <!-- Right tine -->
      <path
         d="M 18.766729,-38 C 28.100062,-39.333333 31.333333,-37.333333 34,-32"
         id="path7"
         sodipodi:nodetypes="cc" />
      <!-- Right upper tine -->
      <path
         d="M 23.038062,-56 C 33.704729,-54.666667 39.333333,-51.333333 42,-46"
         id="path8"
         sodipodi:nodetypes="cc" />
      <!-- Right crown — leans the other way -->
      <path
         d="M 18,-76 Q 28,-86 32,-92"
         id="path9" />
      <path
         d="M 18,-76 Q 10,-88 12,-96"
         id="path10" />
    </g>
    <!-- Small stars / sparks around the head (seeing stars = crazy) -->
    <!-- Deer head silhouette -->
    <g
