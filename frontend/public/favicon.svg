       id="g16">
      <ellipse
         cx="0"
         cy="-6"
         rx="18"
         ry="22"
         id="ellipse15" />
      <!-- Snout -->
      <ellipse
         cx="0"
         cy="18"
         rx="11"
         ry="9"
         id="ellipse16" />
    </g>
    <!-- Ears — one perked, one floppy (crazy asymmetry) -->
    <!-- Left ear: perked up alert -->
    <ellipse
