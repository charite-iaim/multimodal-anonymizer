    <!-- Left eyebrow: high, arched (surprised/manic) -->
    <path
       d="m -12,-19 q 5,-5 10,1"
       stroke="#1e293b"
       stroke-width="2.5"
       fill="none"
       stroke-linecap="round"
       id="path24" />
    <!-- Right eyebrow: lower, angled (creates asymmetric crazy look) -->
    <path
       d="m 4,-17 q 5,-3 10,1"
       stroke="#1e293b"
       stroke-width="2.5"
       fill="none"
       stroke-linecap="round"
       id="path25" />
    <!-- Nose -->
    <ellipse
       cx="0"
       cy="18"
       rx="5.5"
       ry="4"
       fill="#334155"
       id="ellipse25" />
    <circle
