       cy="-12"
       r="3.5"
       fill="#1e293b"
       id="circle22" />
    <circle
       cx="10.5"
       cy="-13"
       r="1"
       fill="#ffffff"
       id="circle23" />
    <!-- Twitching under-eye line -->
